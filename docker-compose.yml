# docker-compose.yml — VPS Live Trading Platform
# Utilisation: docker compose up -d
#
# Services:
#   trader     — LiveStrategyRunner (Java 21, OANDA Practice)
#
# Configuration:
#   - OANDA credentials are loaded from trading-dashboard/.env
#   - Default strategy: VWPReversion + ConsecBar on USD/CHF (highest Sharpe: 4.47)
#   - Change strategy via: STRATEGY=vwp STRATEGY_PAIR=USD_CHF docker compose up -d

services:
  trader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-live
    restart: unless-stopped
    env_file:
      - /home/martinfou/projects/trading-dashboard/.env
    environment:
      - OANDA_ENV=practice
      - LOG_LEVEL=INFO
      # Strategy selection (override via env):
      # vwp → VWPReversionStrategy, consecbar → ConsecutiveBarExhaustionStrategy
      # nymid → NYMidSessionMomentumStrategy, gobig → GoBigStrategy
      # casino → CasinoStrategy, all → all strategies sequentially
      # Or any sqimported: 2_31_177, 2_14_147, 2_15_195, etc.
      - STRATEGY=${STRATEGY:-vwpreversion consecbar}
      - STRATEGY_PAIR=${STRATEGY_PAIR:-USD_CHF}
      - GRANULARITY=${GRANULARITY:-H1}
      - INTERVAL_SEC=${INTERVAL_SEC:-60}
    command: ["$${OANDA_API_KEY}", "$${OANDA_ACCOUNT_ID}", "$${STRATEGY}", "$${GRANULARITY}", "$${INTERVAL_SEC}"]
    volumes:
      - ./data:/app/data        # Trade persistence
      - ./logs:/app/logs        # Logs
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # NFP Week — Short EUR/USD macro play during NFP release week
  # Runs June 1-5, 2026. Volatility-aware trailing stop with NFP-day widening.
  nfp-week:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-nfp-week
    restart: "no"
    env_file:
      - /home/martinfou/projects/trading-dashboard/.env
    environment:
      - OANDA_ENV=practice
      - LOG_LEVEL=INFO
      - STRATEGY=${NFP_STRATEGY:-nfpweek}
      - STRATEGY_PAIR=${NFP_PAIR:-EUR_USD}
      - GRANULARITY=${NFP_GRANULARITY:-H1}
      - INTERVAL_SEC=${NFP_INTERVAL:-60}
    command: ["$${OANDA_API_KEY}", "$${OANDA_ACCOUNT_ID}", "$${STRATEGY}", "$${GRANULARITY}", "$${INTERVAL_SEC}"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Composite Momentum — USD/JPY (OOS PF=2.24, Sharpe=1.00, DD=8.6%)
  comp-momentum:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-comp-momentum
    restart: unless-stopped
    env_file:
      - /home/martinfou/projects/trading-dashboard/.env
    environment:
      - OANDA_ENV=practice
      - LOG_LEVEL=INFO
      - STRATEGY=${COMP_STRATEGY:-compmomentum}
      - STRATEGY_PAIR=${COMP_PAIR:-USD_JPY}
      - GRANULARITY=${COMP_GRANULARITY:-H1}
      - INTERVAL_SEC=${COMP_INTERVAL:-60}
    command: ["$${OANDA_API_KEY}", "$${OANDA_ACCOUNT_ID}", "$${STRATEGY}", "$${GRANULARITY}", "$${INTERVAL_SEC}"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Month Week-Phase — USD/JPY (OOS PF=2.33, DD=4.86%, strong DD control)
  month-week:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-month-week
    restart: unless-stopped
    env_file:
      - /home/martinfou/projects/trading-dashboard/.env
    environment:
      - OANDA_ENV=practice
      - LOG_LEVEL=INFO
      - STRATEGY=${MWP_STRATEGY:-monthweekphase}
      - STRATEGY_PAIR=${MWP_PAIR:-USD_JPY}
      - GRANULARITY=${MWP_GRANULARITY:-H1}
      - INTERVAL_SEC=${MWP_INTERVAL:-60}
    command: ["$${OANDA_API_KEY}", "$${OANDA_ACCOUNT_ID}", "$${STRATEGY}", "$${GRANULARITY}", "$${INTERVAL_SEC}"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  data:
  logs:
