name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  MAVEN_OPTS: -Dorg.slf4j.simpleLogger.log.org.apache.maven.plugins.shade=warn

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test (all modules)
        run: mvn clean install -q

      - name: Run contract & platform tests
        run: mvn test -pl trading-backtest -q -Dtest="BacktestEngineContractTest,PlatformRobustnessTest"

      - name: Run genetics tests
        run: mvn test -pl trading-genetics -q

      - name: Run runtime tests
        run: mvn test -pl trading-runtime -q

      - name: Broker tests (stub mode)
        run: mvn test -pl trading-broker -q
        env:
          IBKR_USE_STUB: "true"

      - name: Build fat JAR (control plane)
        run: mvn package -pl trading-runtime -am -DskipTests -q

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-jar
          path: trading-runtime/target/*-shaded.jar
          if-no-files-found: error

  desktop:
    needs: [java]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up JDK 21 (for jlink)
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: control-plane-jar
          path: ${{ github.workspace }}/trading-runtime/target/

      - name: Prepare desktop resources (JAR + JRE)
        run: |
          mkdir -p desktop-resources/jar
          cp ../trading-runtime/target/trading-runtime-*-shaded.jar desktop-resources/jar/control-plane.jar
          bash scripts/build-jre.sh desktop-resources/jar/control-plane.jar desktop-resources
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + build
        run: npm run build

      - name: Package (${{ matrix.os }})
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)   npx electron-builder --linux ;;
            macos-latest)    npx electron-builder --mac ;;
            windows-latest)  npx electron-builder --win ;;
          esac
        shell: bash
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifact (${{ matrix.os }})
        uses: actions/upload-artifact@v4
        with:
          name: trading-bridge-desktop-${{ matrix.os }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.pkg.tar.zst
            desktop/release/*.dmg
            desktop/release/*.exe
          if-no-files-found: warn
