name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  MAVEN_OPTS: -Dorg.slf4j.simpleLogger.log.org.apache.maven.plugins.shade=warn

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test (all modules)
        run: mvn clean install -q

      - name: Run contract & platform tests
        run: mvn test -pl trading-backtest -q -Dtest="BacktestEngineContractTest,PlatformRobustnessTest"

      - name: Run genetics tests
        run: mvn test -pl trading-genetics -q

      - name: Run runtime tests
        run: mvn test -pl trading-runtime -q

      - name: Broker tests (stub mode)
        run: mvn test -pl trading-broker -q
        env:
          IBKR_USE_STUB: "true"
