name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  MAVEN_OPTS: -Dorg.slf4j.simpleLogger.log.org.apache.maven.plugins.shade=warn

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test (all modules)
        run: mvn clean install -q

      - name: Run contract & platform tests
        run: mvn test -pl trading-backtest -q -Dtest="BacktestEngineContractTest,PlatformRobustnessTest"

      - name: Run genetics tests
        run: mvn test -pl trading-genetics -q

      - name: Run runtime tests
        run: mvn test -pl trading-runtime -q

      - name: Broker tests (stub mode)
        run: mvn test -pl trading-broker -q
        env:
          IBKR_USE_STUB: "true"

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + build
        run: npm run build

      - name: Package (Linux AppImage)
        run: npx electron-builder --linux AppImage
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trading-bridge-desktop-linux
          path: desktop/release/*.AppImage
          if-no-files-found: warn
